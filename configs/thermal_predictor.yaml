# [旧版] MLP 温度预测模型配置
#
# ========== 注意 ==========
# 本文件保留历史 MLP 方案约定，不在 Ultra LSTM 基线中使用。
# Ultra LSTM 专用配置请使用 configs/ultra_thermal_lstm.yaml（方案 A）。
# 两套配置分文件管理，禁止混用。
# 详见 docs/ultra_thermal_lstm_implementation.md §2。
# ==========================

model:
  name: mlp_thermal
  hidden_dims: [128, 128]
  dropout: 0.0

features:
  include:
    - T_leg_history      # (history_len, n_leg_motors)
    - q_leg
    - qdot_leg
    - tau_leg
    - command_vel        # 3 维速度指令（与 Lab 一致时）
  history_len: 5
  n_leg_motors: 12      # 须与 leg_index_mapping.yaml 一致

targets:
  horizon_steps: 1
  predict: T_leg_delta

normalization:
  stats_path: null

training:
  batch_size: 256
  lr: 1.0e-3
  epochs: 100
  device: cuda

deploy:
  target_hz: null
  decimation: null
