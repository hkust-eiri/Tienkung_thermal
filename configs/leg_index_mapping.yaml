# 腿部温度向量 T_leg 的下标与名称映射
#
# ========== 硬性准则（Ultra 为准）==========
# - 训练、落盘、评估、在线推理中的 T_leg[0..11] **唯一**以 **Ultra** 关节顺序为准：
#   与 TienKung-Lab/legged_lab/envs/ultra/ultra_env.py 中 left_leg_ids / right_leg_ids
#   的 find_joints(name_keys) 顺序一致（本文件 motor_names 与之对齐）。
# - 每侧顺序：hip_roll → hip_yaw → hip_pitch → knee_pitch → ankle_pitch → ankle_roll
#   （髋部为 R–Y–P；与 Deploy bodyIdMap 腿向量髋部 R–P–Y **不一致**）。
# - Deploy_Tienkung 仅提供原始话题与中间向量下标 j；**禁止**用 Deploy 腿向量下标 j
#   直接当作 T_leg[i]**。必须先按关节语义名（或 CAN id→名）映射到 Ultra 槽位 i，再
#   写入/读取 T_leg[i]；ct_scale[j] 等亦须与「Deploy 中间向量 j」对齐后再置换到 Ultra 第 i 路。
# ==========================================

n_leg_motors: 12

# 顺序即 T_leg[0]..T_leg[11]；关节名与 Ultra USD/MJCF 中 joint name 一致（*_joint）
motor_names:
  - hip_roll_l_joint
  - hip_yaw_l_joint
  - hip_pitch_l_joint
  - knee_pitch_l_joint
  - ankle_pitch_l_joint
  - ankle_roll_l_joint
  - hip_roll_r_joint
  - hip_yaw_r_joint
  - hip_pitch_r_joint
  - knee_pitch_r_joint
  - ankle_pitch_r_joint
  - ankle_roll_r_joint

# Deploy（TG22）腿段名称，仅作交叉参考；与上表顺序不同（髋为 roll–pitch–yaw）
# deploy_motor_names_reference:
#   - l_hip_roll
#   - l_hip_pitch
#   - l_hip_yaw
#   - l_knee
#   - l_ankle_pitch
#   - l_ankle_roll
#   - r_hip_roll
#   - r_hip_pitch
#   - r_hip_yaw
#   - r_knee
#   - r_ankle_pitch
#   - r_ankle_roll
